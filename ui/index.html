<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Stable-D GUI — stable-diffusion.cpp Launcher</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%230f111a'/><path d='M16 6l3 7 7 3-7 3-3 7-3-7-7-3 7-3z' fill='%237aa2f7'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="toast-container" id="toast-container"></div>

    <div class="app-shell">
      <button
        id="btn-sidebar-toggle"
        class="sidebar-toggle icon-btn"
        type="button"
        aria-label="Toggle navigation menu"
        aria-expanded="false"
        aria-controls="sidebar"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <div id="sidebar-overlay" class="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <svg class="sidebar-logo-svg" viewBox="0 0 32 32" aria-hidden="true">
            <circle
              cx="16"
              cy="16"
              r="13"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
            />
            <path
              d="M16 6l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"
              fill="var(--accent)"
              stroke="none"
            />
          </svg>
          <div>
            <div class="sidebar-title">Stable-D GUI</div>
            <div class="sidebar-subtitle">stable-diffusion.cpp</div>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Sections">
          <div class="nav-section-label">Setup</div>
          <button class="nav-item" data-section="install">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" />
            </svg>
            Install
          </button>
          <button class="nav-item active" data-section="generate-image">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" />
            </svg>
            Generate Image
          </button>
          <button class="nav-item" data-section="generate-video">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 5h10v14H5zM15 9l5-3v12l-5-3" />
            </svg>
            Generate Video
          </button>
          <button class="nav-item" data-section="upscale">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 14v6h6M20 10V4h-6M14 4h6v6M10 20H4v-6" />
            </svg>
            Upscale
          </button>
          <button class="nav-item" data-section="convert">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 7h10M7 7l3-3M7 7l3 3M17 17H7M17 17l-3-3M17 17l-3 3" />
            </svg>
            Convert
          </button>
          <button class="nav-item" data-section="configure">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="18" x2="20" y2="18" />
              <circle cx="9" cy="6" r="2.2" />
              <circle cx="15" cy="12" r="2.2" />
              <circle cx="7" cy="18" r="2.2" />
            </svg>
            Configure
          </button>

          <div class="nav-section-label">Serve</div>
          <button class="nav-item" data-section="server">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" />
            </svg>
            Server &amp; API
          </button>

          <div class="nav-section-label">Manage</div>
          <button class="nav-item" data-section="hf-download">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 18a4 4 0 010-8 5 5 0 019.6-1.5A3.5 3.5 0 0117 18" />
              <path d="M12 12v9m0 0l-3-3m3 3l3-3" />
            </svg>
            HF Download
          </button>
          <button class="nav-item" data-section="presets">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 4h12v17l-6-4-6 4z" />
            </svg>
            Presets
          </button>
        </nav>

        <div class="sidebar-footer">
          <!-- C2 — running-process badge (driven by manager.updateStatusUI). -->
          <div id="sidebar-status" class="sidebar-status" style="display: none">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="sidebar-status-text">running</span>
          </div>
          <span id="version-badge" class="badge badge-neutral"
            >Not Installed</span
          >
        </div>
      </aside>

      <div class="main-content">
        <!-- @partial install -->
        <!-- @partial generate-image -->
        <!-- @partial generate-video -->
        <!-- @partial upscale -->
        <!-- @partial convert -->
        <!-- @partial configure -->
        <!-- @partial server -->
        <!-- @partial hf-download -->
        <!-- @partial presets -->
      </div>
    </div>

    <!-- ═══ CONFIRM MODAL ═══ -->
    <div
      id="confirm-modal"
      class="modal-backdrop hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirm-modal-title"
    >
      <div class="modal-dialog">
        <h3 id="confirm-modal-title">Confirm Action</h3>
        <p id="confirm-modal-message"></p>
        <div class="form-row">
          <button id="confirm-modal-cancel" class="btn">Cancel</button>
          <button id="confirm-modal-ok" class="btn btn-primary">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Scripts loaded in strict dependency order (see PLAN.md §8). Do not reorder. -->
    <script src="/js/flags/options.js"></script>
    <script src="/js/flags/model-bundles.js"></script>
    <script src="/js/flags/definitions.js"></script>
    <script src="/js/flags/categories.js"></script>
    <script src="/js/flags/helpers.js"></script>
    <script src="/js/flag-validation.js"></script>
    <script src="/js/flag-core.js"></script>
    <script src="/js/config-flags-ui.js"></script>
    <script src="/js/manager.js"></script>
    <script src="/js/presets.js"></script>
    <script src="/js/app-data.js"></script>
    <script src="/js/generate/dom.js"></script>
    <script src="/js/generate/formatters.js"></script>
    <script src="/js/generate/dimensions.js"></script>
    <script src="/js/generate/control-bindings.js"></script>
    <script src="/js/generate/model-fields.js"></script>
    <script src="/js/generate/history.js"></script>
    <script src="/js/generate/preview-progress.js"></script>
    <script src="/js/generate/results.js"></script>
    <script src="/js/generate-ui.js"></script>
    <script src="/js/gallery-rendering.js"></script>
    <script src="/js/hf-download-ui.js"></script>
    <script src="/js/server-ui.js"></script>
    <script src="/js/api-tab.js"></script>
    <script src="/js/remote-tunnel-ui.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
