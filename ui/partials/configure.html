<div class="section-panel" id="section-configure" style="display: none">
  <div class="page-header">
    <div>
      <div class="page-title">Configure</div>
      <div class="page-title-sub">
        Full sd-cli flag editor with search + command preview.
      </div>
    </div>
    <div class="cfg-collapse-bar">
      <button id="btn-expand-all" class="btn btn-sm btn-ghost" type="button">Expand All</button>
      <button id="btn-collapse-all" class="btn btn-sm btn-ghost" type="button">Collapse All</button>
    </div>
  </div>
  <div class="card">
    <input type="text" id="flag-search" placeholder="Search flags…" />
    <div id="configure-flags"></div>
    <pre id="command-preview" class="command-preview"></pre>
  </div>
</div>
